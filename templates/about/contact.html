<!-- Contact — HTMX fragment (was incorrectly wrapped in DOCTYPE/html/body) -->
<section class="py-12 px-4">
  <div class="max-w-4xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-10">
      <p class="font-body text-gold text-xs font-semibold tracking-[0.25em] uppercase mb-3">Контакти</p>
      <h1 class="font-display text-4xl sm:text-5xl font-semibold text-charcoal mb-4">Намерете ни</h1>
      <div class="flex items-center justify-center gap-3 max-w-xs mx-auto">
        <span class="flex-1 h-px bg-gold/50"></span>
        <span class="text-gold text-sm">✦</span>
        <span class="flex-1 h-px bg-gold/50"></span>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

      <!-- Left — contact info + map -->
      <div class="flex flex-col gap-6">

        <!-- Info card -->
        <div class="bg-white rounded-lg border border-parchment shadow-sm p-6">
          <h2 class="font-display text-xl font-semibold text-charcoal mb-4">Информация</h2>
          <div class="space-y-3 text-sm text-charcoal/80">
            <p>
              <span class="font-semibold text-charcoal">Телефон:</span>
              <a href="tel:+359123456789" class="ml-2 hover:text-gold transition-colors">(123) 456-7890</a>
            </p>
            <p>
              <span class="font-semibold text-charcoal">Адрес:</span>
              <span class="ml-2">ул. Сердика 25, София</span>
            </p>
          </div>

          <div class="flex flex-col gap-2 mt-5 pt-4 border-t border-parchment/60">
            <a href="/schedule.html"
               class="text-sm text-charcoal/70 hover:text-gold transition-colors duration-200 underline underline-offset-2">
              Вижте разписанието →
            </a>
            <a href="/company-details.html"
               class="text-sm text-charcoal/70 hover:text-gold transition-colors duration-200 underline underline-offset-2">
              Данни на фирмата →
            </a>
          </div>
        </div>

        <!-- Map -->
        <div class="rounded-lg overflow-hidden border border-parchment shadow-sm">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2932.0745740030065!2d23.324022000000003!3d42.702141700000006!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40aa85f96c2593d1%3A0x94986e15613f5bbb!2sSwing%20Society!5e0!3m2!1sen!2sbg!4v1737021612029!5m2!1sen!2sbg"
            width="100%" height="280" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

      </div>

      <!-- Right — contact form -->
      <div class="bg-white rounded-lg border border-parchment shadow-sm p-6">
        <h2 class="font-display text-xl font-semibold text-charcoal mb-6">Пишете ни</h2>

        <form action="#" method="post" class="space-y-4">

          <div>
            <label for="contact-name" class="block text-sm font-medium text-charcoal mb-1.5">Вашето ime</label>
            <input type="text" id="contact-name" name="name" required
                   class="w-full px-3 py-2.5 border border-parchment rounded text-sm font-body
                          focus:outline-none focus:border-charcoal focus:ring-1 focus:ring-charcoal/20
                          transition-colors duration-200">
          </div>

          <div>
            <label for="contact-email" class="block text-sm font-medium text-charcoal mb-1.5">Имейл адрес</label>
            <input type="email" id="contact-email" name="email" required
                   class="w-full px-3 py-2.5 border border-parchment rounded text-sm font-body
                          focus:outline-none focus:border-charcoal focus:ring-1 focus:ring-charcoal/20
                          transition-colors duration-200">
          </div>

          <div>
            <label for="contact-message" class="block text-sm font-medium text-charcoal mb-1.5">Съобщение</label>
            <textarea id="contact-message" name="message" rows="5"
                      class="w-full px-3 py-2.5 border border-parchment rounded text-sm font-body
                             focus:outline-none focus:border-charcoal focus:ring-1 focus:ring-charcoal/20
                             transition-colors duration-200 resize-none"></textarea>
          </div>

          <button type="submit"
                  class="w-full py-3 bg-gold text-charcoal font-body font-semibold text-xs tracking-wider uppercase rounded hover:bg-goldDark transition-colors duration-200">
            Изпратете
          </button>

        </form>
      </div>

    </div>
  </div>
</section>
