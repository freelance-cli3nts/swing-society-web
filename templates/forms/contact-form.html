<div class="form-container" id="contact-form-container">
  <button class="close-btn" hx-get="" hx-target="closest .form-container" hx-trigger="click" hx-swap="delete">&times;</button>
  
  <section class="contact-info">
    <h3>Пишете ни!</h3>
    <p>Изпратете ни съобщение и ние ще се свържем с вас възможно най-скоро.</p>
  </section>
  
  <form id="contact-form" 
        hx-post="/api/contact" 
        hx-target="this" 
        hx-swap="outerHTML" 
        hx-indicator="#loading-spinner">
    <div class="form-section personal-info">
      <div class="form-group">
        <label for="name">Име*</label>
        <input type="text" id="name" name="name" required
               hx-post="/api/validate-name" 
               hx-target="#name-error" 
               hx-swap="innerHTML" 
               hx-indicator="#loading-spinner" 
               hx-trigger="blur, keyup changed delay:500ms">
        <small class="error-message" id="name-error"></small>
      </div>
      
      <div class="form-group">
        <label for="email">Имейл адрес*</label>
        <input type="email" id="email" name="email" required 
               hx-post="/api/validate-email"  
               hx-target="#email-error" 
               hx-swap="innerHTML" 
               hx-indicator="#loading-spinner" 
               hx-trigger="blur, keyup changed delay:500ms">
        <small class="error-message" id="email-error"></small>
      </div>

      <div class="form-group">
        <label for="phone">Телефон (по желание)</label>
        <input type="tel" id="phone" name="phone"
               hx-post="/api/validate-phone" required
               hx-target="#phone-error" 
               hx-swap="innerHTML" 
               hx-indicator="#loading-spinner" 
               hx-trigger="blur, keyup changed delay:500ms">
        <small class="error-message" id="phone-error"></small>
      </div>

      <div class="form-group">
        <label for="message">Съобщение*</label>
        <textarea id="message" name="message" rows="4" required></textarea>
      </div>
      
      <div class="form-question">
        <p>Как предпочитате да се свържем с вас:</p>
        <div class="radio-group">
          <label class="option-label">
            <input type="radio" name="contactPreference" value="email" checked>
            Имейл
          </label>
          <label class="option-label">
            <input type="radio" name="contactPreference" value="phone">
            Телефонен разговор
          </label>
          <label class="option-label">
            <input type="radio" name="contactPreference" value="viber">
            Viber съобщение
          </label>
          <label class="option-label">
            <input type="radio" name="contactPreference" value="whatsapp">
            Whatsapp съобщение
          </label>
        </div>
      </div>
    </div>
    
    <div class="form-group gdpr">
      <input type="checkbox" id="gdpr" name="gdpr" required>
      <label for="gdpr">Съгласен съм с <a href="/gdpr.html" target="_blank" class="terms-link">GDPR</a></label>
    </div>

    <div class="form-actions">
      <button type="submit" class="submit-btn">Изпрати</button>
      <div id="loading-spinner" class="htmx-indicator">
        <div class="spinner"></div>
      </div>
    </div>
  </form>
</div>

<!-- Success Message (Initially Hidden) -->
<div class="success-message" id="success-message" style="display: none;">
  <h3>Благодарим за съобщението!</h3>
  <p>Ще се свържем с вас възможно най-скоро.</p>
</div>
