<div class="carousel" aria-label="Carousel Component" data-carousel="{{ carouselType }}">
  <div class="carousel-inner">
    {{ range .Items }}
      <div class="carousel-item">
        {{ if .Image }}
          <img src="{{ .Image }}" alt="{{ .Alt }}">
        {{ else if. Video }}
          <video controls>
            <source src="{{ .Video }}" type="video/mp4">
            Your browser does not support the video tag.
          </video>
        {{ else }}
          <h2>{{ .Title }}</h2>
          <p>{{ .Text }}</p>
        {{ end }}
      </div>
    {{ end }}
  </div>
  <button class="carousel-control prev" aria-label="Previous Slide">&#10094;</button>
  <button class="carousel-control next" aria-label="Next Slide">&#10095;</button>
</div>
