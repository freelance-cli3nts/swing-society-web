root = "."
tmp_dir = "tmp"

[build]
  # Updated build command to point to server/main.go
  cmd = "cd server && go build -o ../tmp/main ."
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor"]
  include_ext = ["go", "tpl", "tmpl", "html", "css", "js"]
  exclude_regex = ["_test\\.go"]

[log]
  time = false
